[options]
; Master password for database management (change for production).
admin_passwd = admin

; The custom module lives in /mnt/extra-addons (see docker-compose.yml).
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons

; Database connection - values come from the compose service "db".
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo

; Show the full list of databases (handy in a single-DB dev setup).
list_db = True

; Logging.
log_level = info
